<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⡍⡄⠵</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='black'/></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 60px;
            letter-spacing: 0.5rem;
            font-weight: 300;
        }

        .section {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .label {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
        }

        .text-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .text-display {
            font-size: 1.4rem;
            line-height: 1.5;
            color: #fff;
            letter-spacing: 2px;
            text-align: left;
            white-space: pre;
            display: block;
        }

        .copy-btn {
            cursor: pointer;
            color: #444;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            opacity: 0;
        }

        .copy-btn svg {
            width: 1.4rem;
            height: 1.4rem;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .copy-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }

        @media (min-width: 769px) {
            .copy-btn {
                position: absolute;
                left: 100%;
                margin-left: 25px;
            }

            .text-wrapper:hover .copy-btn {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.6rem;
                letter-spacing: 0.3rem;
            }

            .text-display {
                font-size: 1.1rem;
            }

            .copy-btn {
                opacity: 1;
                margin-left: 10px;
                margin-right: -32.4px;
            }
        }

        .footer {
            margin-top: 40px;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⡍⡄⠵</h1>

        <div class="section">
            <div class="label">Input String (X)</div>
            <div class="text-wrapper">
                <div class="text-display" id="inputBox"></div>
                <div class="copy-btn" id="copyBtn" title="Copy Input">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="label">MD5 Output (Y = MD5(X))</div>
            <div class="text-wrapper">
                <div class="text-display" id="hashY"></div>
            </div>
        </div>

        <div class="section">
            <div class="label">Double MD5 Output (Z = MD5(Y))</div>
            <div class="text-wrapper">
                <div class="text-display" id="hashZ"></div>
            </div>
        </div>

        <div class="footer">
            <a href="https://github.com/senzi/rare-bits/tree/main/2026-04-08-md5-numeric-chain" target="_blank"
                class="github-link">
                <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
                </svg>
                GitHub
            </a>
        </div>
    </div>

    <script>
        // 这里的数字你可以自己修改为32位
        const INPUT_X = "05810747610981476965050347470789";
        const HEX_CHARS = "0123456789abcdef";

        const getStep = () => window.innerWidth <= 768 ? 16 : 32;

        function formatWithBreaks(str, step) {
            let res = "";
            for (let i = 0; i < str.length; i += step) {
                res += str.substring(i, i + step) + (i + step < str.length ? "\n" : "");
            }
            return res;
        }

        // 动画逻辑
        function dualAnimate(targetY, targetZ) {
            const elY = document.getElementById('hashY');
            const elZ = document.getElementById('hashZ');

            const durationY = 1500; // Y 1.5秒完成
            const durationZ = 3000; // 总计3秒完成
            const startTime = Date.now();

            function update() {
                const step = getStep();
                const now = Date.now();
                const elapsed = now - startTime;

                // 计算进度
                const progY = Math.min(elapsed / durationY, 1);
                const progZ = Math.min(elapsed / durationZ, 1);

                // 更新 Y
                let dispY = "";
                const fixedY = Math.floor(progY * targetY.length);
                for (let i = 0; i < targetY.length; i++) {
                    dispY += (i < fixedY) ? targetY[i] : HEX_CHARS[Math.floor(Math.random() * 16)];
                }
                elY.textContent = formatWithBreaks(dispY, step);

                // 更新 Z
                let dispZ = "";
                const fixedZ = Math.floor(progZ * targetZ.length);
                for (let i = 0; i < targetZ.length; i++) {
                    dispZ += (i < fixedZ) ? targetZ[i] : HEX_CHARS[Math.floor(Math.random() * 16)];
                }
                elZ.textContent = formatWithBreaks(dispZ, step);

                if (progZ < 1) {
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

        function init() {
            const step = getStep();
            document.getElementById('inputBox').textContent = formatWithBreaks(INPUT_X, step);

            // 计算 MD5 (Y) 和 Double MD5 (Z)
            const y = CryptoJS.MD5(INPUT_X).toString();
            const z = CryptoJS.MD5(y).toString();

            dualAnimate(y, z);
        }

        window.addEventListener('DOMContentLoaded', init);

        // 复制功能
        document.getElementById('copyBtn').addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(INPUT_X);
                const btn = document.getElementById('copyBtn');
                btn.style.color = '#4caf50';
                setTimeout(() => btn.style.color = '', 500);
            } catch (err) {
                console.error('Copy failed', err);
            }
        });

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            const step = getStep();
            document.getElementById('inputBox').textContent = formatWithBreaks(INPUT_X, step);
        });
    </script>
</body>

</html>
