<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⡓⡈⡁⠭⠲⠵⠶</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='black'/></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 60px;
            letter-spacing: 0.5rem;
            font-weight: 300;
        }

        .section {
            margin-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .label {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
        }

        .text-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .text-display {
            font-size: 1.6rem;
            line-height: 1.5;
            color: #fff;
            letter-spacing: 2px;
            text-align: left;
            white-space: pre;
            display: block;
        }

        /* 复制按钮基础样式 */
        .copy-btn {
            cursor: pointer;
            color: #444;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            opacity: 0;
        }

        .copy-btn svg {
            width: 1.4rem;
            height: 1.4rem;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .copy-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }

        /* 桌面端布局 */
        @media (min-width: 769px) {
            .copy-btn {
                position: absolute;
                left: 100%;
                margin-left: 25px;
            }

            .text-wrapper:hover .copy-btn {
                opacity: 1;
            }
        }

        /* 移动端布局 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.6rem;
                letter-spacing: 0.3rem;
            }

            .text-display {
                font-size: 1.1rem;
            }

            .copy-btn {
                opacity: 1;
                margin-left: 10px;
                /* 关键：使用负边距抵消自身宽度，保持文字居中 */
                margin-right: -32.4px;
            }
        }

        /* 哈希字符动画样式 */
        .char-fixed {
            color: #fff;
        }

        .char-anim {
            color: #444;
        }

        .footer {
            margin-top: 40px;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⡓⡈⡁⠭⠲⠵⠶</h1>

        <div class="section">
            <div class="label">Input String</div>
            <div class="text-wrapper">
                <div class="text-display" id="inputBox"></div>
                <div class="copy-btn" id="copyBtn" title="Copy Input String">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="label">SHA-256 Output</div>
            <div class="text-wrapper">
                <div class="text-display" id="hashBox"></div>
            </div>
        </div>

        <div class="footer">
            <a href="https://github.com/senzi/rare-bits/tree/main/2026-04-07-sha256-numbersonly" target="_blank"
                class="github-link">
                <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
                </svg>
                GitHub
            </a>
        </div>
    </div>

    <script>
        const INPUT_STRING = "2026040632327432543896165494169870541850905476385874367696989478";
        const HEX_CHARS = "0123456789abcdef";

        // 获取当前换行步长
        const getStep = () => window.innerWidth <= 768 ? 16 : 32;

        // 处理字符串换行显示
        function formatWithBreaks(str, step) {
            let res = "";
            for (let i = 0; i < str.length; i += step) {
                res += str.substring(i, i + step) + (i + step < str.length ? "\n" : "");
            }
            return res;
        }

        async function getSHA256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 动画函数
        function animateHash(targetHash) {
            const hashBox = document.getElementById('hashBox');
            const duration = 3000;
            const startTime = Date.now();
            const totalChars = targetHash.length;

            function update() {
                const step = getStep();
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const fixedCount = Math.floor(progress * totalChars);

                let currentDisplay = "";
                for (let i = 0; i < totalChars; i++) {
                    if (i < fixedCount) {
                        currentDisplay += targetHash[i];
                    } else {
                        currentDisplay += HEX_CHARS[Math.floor(Math.random() * 16)];
                    }
                }

                hashBox.textContent = formatWithBreaks(currentDisplay, step);

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    hashBox.textContent = formatWithBreaks(targetHash, step);
                }
            }
            requestAnimationFrame(update);
        }

        async function init() {
            // 初始化 Input
            const step = getStep();
            document.getElementById('inputBox').textContent = formatWithBreaks(INPUT_STRING, step);

            // 计算并启动动画
            const hash = await getSHA256(INPUT_STRING);
            animateHash(hash);
        }

        // 响应窗口缩放
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(async () => {
                const step = getStep();
                document.getElementById('inputBox').textContent = formatWithBreaks(INPUT_STRING, step);
                const hash = await getSHA256(INPUT_STRING);
                document.getElementById('hashBox').textContent = formatWithBreaks(hash, step);
            }, 100);
        });

        window.addEventListener('DOMContentLoaded', init);

        // 复制逻辑
        document.getElementById('copyBtn').addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(INPUT_STRING);
                const btn = document.getElementById('copyBtn');
                btn.style.color = '#4caf50';
                setTimeout(() => btn.style.color = '', 500);
            } catch (err) {
                console.error('Copy failed', err);
            }
        });
    </script>
</body>

</html>
